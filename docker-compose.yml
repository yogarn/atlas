version: '3.8'

services:
  atlas:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: atlas
    restart: unless-stopped
    env_file: .env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3003:3000"   # host:container — change the host port to match your Cloudflare tunnel
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - database

networks:
  database:
    external: true
